<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#455A64"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <rect width="900" height="200" rx="12" fill="url(#grid)"/>
  <!-- Magnifying glass over gear icon -->
  <g transform="translate(80, 100)" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Gear -->
    <g transform="translate(-5, -5)">
      <circle cx="0" cy="0" r="8" fill="rgba(255,255,255,0.1)"/>
      <circle cx="0" cy="0" r="4" fill="none"/>
      <path d="M-2,-13 L2,-13 L3,-9 L-3,-9 Z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.9)"/>
      <path d="M-2,13 L2,13 L3,9 L-3,9 Z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.9)"/>
      <path d="M-13,-2 L-13,2 L-9,3 L-9,-3 Z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.9)"/>
      <path d="M13,-2 L13,2 L9,3 L9,-3 Z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.9)"/>
    </g>
    <!-- Magnifying glass -->
    <circle cx="8" cy="-8" r="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.9)"/>
    <line x1="21" y1="5" x2="33" y2="17" stroke-width="3.5"/>
    <!-- Second smaller gear -->
    <g transform="translate(25, -25) scale(0.5)">
      <circle cx="0" cy="0" r="8" fill="rgba(255,255,255,0.1)"/>
      <circle cx="0" cy="0" r="4" fill="none"/>
    </g>
  </g>
  <!-- Title -->
  <text x="450" y="90" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">AdamPartsFinder</text>
  <!-- Subtitle -->
  <text x="450" y="130" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">Price comparison tool for supplier parts</text>
</svg>
